<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lowtide — Sign In</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #030e1c;
      color: #caf0f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #0a1628;
      border: 1px solid rgba(56,189,248,0.12);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .logo { font-size: 11px; font-weight: 800; letter-spacing: 0.2em; color: #94a3b8; text-transform: uppercase; margin-bottom: 8px; }
    .pro-badge { display: inline-block; font-size: 7px; font-weight: 800; letter-spacing: 0.1em; background: linear-gradient(135deg,#f59e0b,#fbbf24); color: #030e1c; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; margin-left: 6px; vertical-align: middle; }
    .title { font-size: 22px; font-weight: 800; color: #e2e8f0; margin-bottom: 8px; letter-spacing: -0.02em; }
    .subtitle { font-size: 13px; color: #64748b; margin-bottom: 32px; line-height: 1.5; }
    .btn-google {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: 1px solid rgba(56,189,248,0.2);
      background: rgba(56,189,248,0.04);
      color: #caf0f8;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      font-family: inherit;
      margin-bottom: 16px;
    }
    .btn-google:hover { background: rgba(56,189,248,0.08); border-color: rgba(56,189,248,0.4); }
    .divider { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(56,189,248,0.08); }
    .divider span { font-size: 11px; color: #334155; }
    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(56,189,248,0.12);
      background: rgba(56,189,248,0.03);
      color: #caf0f8;
      font-size: 13px;
      font-family: inherit;
      margin-bottom: 10px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: rgba(56,189,248,0.4); }
    input::placeholder { color: #334155; }
    .btn-email {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      background: #38bdf8;
      color: #030e1c;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      margin-bottom: 16px;
    }
    .btn-email:hover { background: #7dd3fc; }
    .btn-email:disabled { opacity: 0.5; cursor: wait; }
    .status { font-size: 12px; color: #64748b; min-height: 20px; }
    .status.success { color: #10b981; }
    .status.error { color: #ef4444; }
    .footer { margin-top: 24px; font-size: 11px; color: #334155; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Lowtide <span class="pro-badge">PRO</span></div>
    <div class="title">Welcome back</div>
    <div class="subtitle">Sign in to sync your recipes,<br/>One-Shot credits, and settings.</div>

    <button class="btn-google" id="btn-google">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
      Continue with Google
    </button>

    <div class="divider"><span>or use email</span></div>

    <input type="email" id="email-input" placeholder="your@email.com" />
    <button class="btn-email" id="btn-email">Send Magic Link</button>
    <div class="status" id="status"></div>

    <div class="footer">By signing in you agree to Lowtide's terms of service.</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://lnejnktkjspamwgkhzjl.supabase.co';
    const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY_HERE';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const REDIRECT = 'https://lowtide-auth.vercel.app/auth/callback';

    document.getElementById('btn-google').onclick = async () => {
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: REDIRECT }
      });
      if (error) showStatus(error.message, 'error');
    };

    document.getElementById('btn-email').onclick = async () => {
      const email = document.getElementById('email-input').value.trim();
      if (!email) return;
      const btn = document.getElementById('btn-email');
      btn.disabled = true;
      btn.textContent = 'Sending...';
      const { error } = await sb.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: REDIRECT }
      });
      if (error) {
        showStatus(error.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Send Magic Link';
      } else {
        showStatus('Check your email for the magic link ✓', 'success');
        btn.textContent = 'Email sent';
      }
    };

    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + type;
    }
  </script>
</body>
</html>
