<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Lowtide — Signing you in...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #030e1c;
      color: #caf0f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    .logo { font-size: 11px; font-weight: 800; letter-spacing: 0.2em; color: #94a3b8; text-transform: uppercase; }
    .msg { font-size: 15px; color: #64748b; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(56,189,248,0.15);
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success { color: #10b981; font-size: 15px; }
    .error { color: #ef4444; font-size: 13px; max-width: 300px; text-align: center; }
  </style>
</head>
<body>
  <div class="logo">Lowtide</div>
  <div class="spinner" id="spinner"></div>
  <div class="msg" id="msg">Completing sign in...</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://lnejnktkjspamwgkhzjl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxuZWpua3RranNwYW13Z2toempsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzODU3MTAsImV4cCI6MjA4ODk2MTcxMH0.xOvkrjbdCEaIYbBNpfd3mhJSrD5WB-aDDW93jAEPx2s';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function handleCallback() {
      const { data, error } = await sb.auth.getSession();

      if (error || !data.session) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('msg').className = 'error';
        document.getElementById('msg').textContent = 'Sign in failed. Please close this tab and try again.';
        return;
      }

      const session = data.session;
      const token = session.access_token;
      const user = session.user;

      // Send token to extension
      if (typeof chrome !== 'undefined' && chrome.runtime) {
        // Try all known extension IDs — update this when you have your Chrome Web Store ID
        const EXTENSION_IDS = ['fgkbfgjgdlnepjjepejabhkijcejojnf'];
          // Add your unpacked extension ID here during development
          // It looks like: abcdefghijklmnopqrstuvwxyzabcdef
        ];

        let sent = false;
        for (const id of EXTENSION_IDS) {
          try {
            chrome.runtime.sendMessage(id, {
              type: 'LOWTIDE_AUTH',
              token,
              user: { id: user.id, email: user.email, name: user.user_metadata?.full_name }
            }, (response) => {
              if (response?.ok) {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('msg').className = 'success';
                document.getElementById('msg').textContent = '✓ Signed in. You can close this tab.';
                setTimeout(() => window.close(), 1500);
              }
            });
            sent = true;
            break;
          } catch(e) {}
        }

        if (!sent) {
          // Fallback — store in localStorage so extension can poll for it
          localStorage.setItem('lowtide_pending_token', JSON.stringify({
            token,
            user: { id: user.id, email: user.email, name: user.user_metadata?.full_name },
            ts: Date.now()
          }));
          document.getElementById('spinner').style.display = 'none';
          document.getElementById('msg').className = 'success';
          document.getElementById('msg').textContent = '✓ Signed in. You can close this tab.';
          setTimeout(() => window.close(), 1500);
        }

      } else {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('msg').className = 'success';
        document.getElementById('msg').textContent = '✓ Signed in. You can close this tab.';
        setTimeout(() => window.close(), 1500);
      }
    }

    handleCallback();
  </script>
</body>
</html>
