<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lowtide – Signing In</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #030e1c; color: #e2e8f0; font-family: 'Inter', -apple-system, sans-serif;
    display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { text-align: center; }
  .wordmark { font-size: 11px; font-weight: 700; letter-spacing: 0.2em; color: #64748b;
    text-transform: uppercase; margin-bottom: 24px; }
  .spinner { width: 32px; height: 32px; border: 2px solid rgba(56,189,248,0.15);
    border-top-color: #38bdf8; border-radius: 50%; animation: spin 0.8s linear infinite;
    margin: 0 auto 20px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .msg { font-size: 13px; color: #94a3b8; }
  .success { color: #38bdf8; font-weight: 600; }
  .error { color: #ef4444; }
</style>
</head>
<body>
<div class="card">
  <div class="wordmark">Lowtide</div>
  <div class="spinner" id="spinner"></div>
  <div class="msg" id="msg">Completing sign in...</div>
</div>
<script>
  const EXTENSION_ID = 'obkaeefbffkidjmfhnpnjhojcnbjjmbj';

  function showSuccess(name, email) {
    document.getElementById('spinner').style.display = 'none';
    const m = document.getElementById('msg');
    m.className = 'msg success';
    m.textContent = name ? '✓ Welcome, ' + name : email ? '✓ Signed in as ' + email : '✓ Signed in successfully';
    setTimeout(() => window.close(), 2000);
  }

  function showError(reason) {
    document.getElementById('spinner').style.display = 'none';
    const m = document.getElementById('msg');
    m.className = 'msg error';
    m.textContent = reason || 'Sign-in failed. Please try again.';
  }

  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const access_token = params.get('access_token');

  if (!access_token) {
    showError('No token received. Please try signing in again.');
  } else {
    let email = null, name = null;
    try {
      const payload = JSON.parse(atob(access_token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
      email = payload.email || payload.user_metadata?.email || null;
      name = payload.user_metadata?.full_name || payload.user_metadata?.name || null;
    } catch (e) {}

    try {
      localStorage.setItem('lowtide_pending_token', JSON.stringify({ token: access_token, email, name }));
    } catch (e) {}

    const sendToExtension = () => {
      if (typeof chrome !== 'undefined' && chrome.runtime && chrome.runtime.sendMessage) {
        try {
          chrome.runtime.sendMessage(EXTENSION_ID, { type: 'LOWTIDE_TOKEN', token: access_token, email, name }, (response) => {
            if (chrome.runtime.lastError) console.warn('Extension message failed:', chrome.runtime.lastError.message);
            showSuccess(name, email);
          });
        } catch (e) { showSuccess(name, email); }
      } else {
        showSuccess(name, email);
      }
    };
    setTimeout(sendToExtension, 300);
  }
</script>
</body>
</html>
